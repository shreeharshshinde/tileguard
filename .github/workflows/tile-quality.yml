name: CI

on:
  push:
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  workspace:
    name: TypeScript workspace
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and type-check all packages
        run: pnpm build

      - name: Run all tests
        run: pnpm test

  legacy-js:
    name: Legacy JavaScript oracle
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install legacy dependencies
        run: npm install
        working-directory: legacy/js

      - name: Run legacy unit tests
        run: npm test
        working-directory: legacy/js

      - name: Check style fixtures
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' style; do
            node legacy/js/bin/tileguard.js style-lint "$style" --format json
          done < <(find fixtures -name style.json -print0)

      - name: Smoke-test render fixtures
        run: node legacy/js/bin/tileguard.js render --fixtures fixtures --format json

  legacy-python:
    name: Legacy Python oracle
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test runner
        run: python -m pip install pytest

      - name: Run legacy unit tests
        run: python -m pytest legacy/python/tests -v
        env:
          PYTHONPATH: legacy/python
