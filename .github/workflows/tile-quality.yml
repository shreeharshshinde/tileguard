name: Tile Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  style-lint:
    name: Style Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
        working-directory: packages/js

      - name: Lint style fixtures
        run: |
          find fixtures -name "style.json" | while read f; do
            node packages/js/bin/tileguard.js style-lint "$f" --format json
          done

  tile-validate:
    name: Tile Validation
    runs-on: ubuntu-22.04
    needs: style-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
        working-directory: packages/js

      - name: Validate tile fixtures
        run: |
          find fixtures -name "*.pbf" | while read f; do
            node packages/js/bin/tileguard.js validate "$f" --format json
          done

  js-tests:
    name: JS Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
        working-directory: packages/js

      - run: npm test
        working-directory: packages/js

  python-tests:
    name: Python Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: packages/python/requirements.txt

      - name: Install dependencies
        run: |
          pip install mapbox-vector-tile requests click shapely Pillow rich pytest
          pip install -e .
        working-directory: packages/python

      - run: pytest tests/ -v
        working-directory: packages/python

  render-test:
    name: Render Tests
    runs-on: ubuntu-22.04
    needs: [style-lint, tile-validate]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
        working-directory: packages/js

      - name: Install system deps
        run: sudo apt-get install -y xvfb libgbm-dev

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: packages/js

      - name: Run render tests
        run: xvfb-run -a node packages/js/bin/tileguard.js render --fixtures ./fixtures/ --format json --output render-results.json

      - name: Upload diff images on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: render-diffs-${{ github.sha }}
          path: |
            fixtures/**/actual.png
            fixtures/**/diff.png
          retention-days: 14

      - name: Comment render results on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('render-results.json')) return;
            const results = JSON.parse(fs.readFileSync('render-results.json', 'utf-8'));
            const passed = results.filter(r => r.pass).length;
            const failed = results.filter(r => !r.pass).length;
            const emoji = failed === 0 ? '✅' : '❌';
            const failures = results
              .filter(r => !r.pass)
              .map(r => `- \`${r.fixture}\`: ${r.diffPercent}% pixels differ`)
              .join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ${emoji} Render Tests: ${passed}/${results.length} passing\n${failures}`
            });
